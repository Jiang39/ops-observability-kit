name: ops-observability-kit

services:
  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../configs/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    depends_on:
      - loki
    volumes:
      - ../configs/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - ./sample-logs:/var/log/sample:ro
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    depends_on:
      - otel-collector
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.0.0
    depends_on:
      - loki
      - prometheus
      - tempo
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"
    volumes:
      - ../configs/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otel/collector.yaml"]
    depends_on:
      - tempo
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ../configs/otel/collector.yaml:/etc/otel/collector.yaml:ro
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.28.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ../configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - observability

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  tempo-data:

networks:
  observability:
    driver: bridge
