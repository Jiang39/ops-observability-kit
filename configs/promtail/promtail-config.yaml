server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sample-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: sample-logs
          service: sample-app
          env: local
          __path__: /var/log/sample/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service: service
            module: module
            env: env
            traceId: traceId
            spanId: spanId
            errorCode: errorCode
            userId: userId
            path: path
            latencyMs: latencyMs
            level: level
            message: message
      - labels:
          service:
          env:
          level:
          errorCode:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message
