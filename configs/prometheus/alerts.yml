groups:
  - name: api-baseline-alerts
    rules:
      - alert: High5xxRatio
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "5xx ratio is above 5%"
          description: "5xx ratio has been above 5% for 5 minutes."

      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency is above 500ms"
          description: "P95 latency exceeded threshold for 10 minutes."

      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Target instance down"
          description: "Prometheus target has been down for more than 2 minutes."
