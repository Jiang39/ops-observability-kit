global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # Example application targets for local mode.
  # Replace with your real service endpoints when available.
  - job_name: app-example
    static_configs:
      - targets: ["127.0.0.1:9101"]

  - job_name: middleware-example
    static_configs:
      - targets: ["127.0.0.1:9121"]
